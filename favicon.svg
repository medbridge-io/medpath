<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#162C4E"/>
      <stop offset="100%" stop-color="#0B1D35"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B1D35"/>
      <stop offset="100%" stop-color="#0EC489"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- top accent bar -->
  <rect x="0" y="0" width="32" height="2.5" rx="1" fill="url(#bar)"/>

  <!-- MP text -->
  <text
    x="16" y="22"
    font-family="'DM Sans', -apple-system, sans-serif"
    font-size="13"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="0.5"
    opacity="0.92"
  >MP</text>
</svg>
